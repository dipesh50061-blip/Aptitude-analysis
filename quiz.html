<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brain Quest Quiz</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --card: #1a1a26;
    --accent: #f0c040;
    --accent2: #e05a30;
    --text: #f0ede8;
    --muted: #6a6a80;
    --border: #2a2a3a;
    --correct: #3ecf8e;
    --wrong: #e05a30;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  /* Background noise texture */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
  }

  /* Floating blobs */
  .blob {
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.12;
    pointer-events: none;
    animation: drift 8s ease-in-out infinite alternate;
  }
  .blob-1 { width: 400px; height: 400px; background: var(--accent); top: -100px; left: -100px; animation-delay: 0s; }
  .blob-2 { width: 350px; height: 350px; background: var(--accent2); bottom: -80px; right: -80px; animation-delay: -3s; }
  .blob-3 { width: 250px; height: 250px; background: #6040c0; top: 50%; left: 60%; animation-delay: -6s; }

  @keyframes drift {
    from { transform: translate(0, 0) scale(1); }
    to { transform: translate(30px, 20px) scale(1.05); }
  }

  /* Main container */
  .container {
    width: 100%;
    max-width: 680px;
    padding: 20px;
    position: relative;
    z-index: 1;
  }

  /* Screens */
  .screen { display: none; animation: fadeUp 0.5s ease forwards; }
  .screen.active { display: block; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Welcome screen */
  .welcome-header {
    text-align: center;
    margin-bottom: 40px;
  }

  .badge {
    display: inline-block;
    background: var(--accent);
    color: var(--bg);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 5px 14px;
    border-radius: 20px;
    margin-bottom: 20px;
  }

  .title-big {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(64px, 12vw, 100px);
    line-height: 0.9;
    letter-spacing: 2px;
    margin-bottom: 16px;
  }
  .title-big span { color: var(--accent); }

  .subtitle {
    color: var(--muted);
    font-size: 15px;
    line-height: 1.6;
    max-width: 400px;
    margin: 0 auto 36px;
  }

  .stats-row {
    display: flex;
    justify-content: center;
    gap: 32px;
    margin-bottom: 40px;
  }
  .stat {
    text-align: center;
  }
  .stat-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 36px;
    color: var(--accent);
    line-height: 1;
  }
  .stat-label {
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-top: 4px;
  }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 32px;
  }

  .input-group {
    margin-bottom: 20px;
  }
  .input-group label {
    display: block;
    font-size: 12px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
    font-weight: 600;
  }
  .input-group input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 18px;
    font-size: 16px;
    font-family: 'DM Sans', sans-serif;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s;
  }
  .input-group input:focus {
    border-color: var(--accent);
  }
  .input-group input::placeholder { color: var(--muted); }

  .btn {
    width: 100%;
    padding: 16px;
    border-radius: 12px;
    border: none;
    font-family: 'DM Sans', sans-serif;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.03em;
  }
  .btn-primary {
    background: var(--accent);
    color: var(--bg);
  }
  .btn-primary:hover {
    background: #ffd060;
    transform: translateY(-2px);
    box-shadow: 0 8px 30px rgba(240,192,64,0.25);
  }
  .btn-secondary {
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--border);
    margin-top: 10px;
  }
  .btn-secondary:hover { border-color: var(--muted); }

  /* Quiz screen */
  .quiz-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 28px;
  }

  .q-label {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--muted);
    font-weight: 600;
  }

  .score-pill {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 6px 16px;
    font-size: 14px;
    font-weight: 600;
  }
  .score-pill span { color: var(--accent); }

  /* Progress bar */
  .progress-track {
    height: 4px;
    background: var(--surface);
    border-radius: 4px;
    margin-bottom: 28px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 4px;
    transition: width 0.5s ease;
  }

  .question-text {
    font-size: 22px;
    font-weight: 500;
    line-height: 1.4;
    margin-bottom: 28px;
  }

  .options-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 28px;
  }

  .option-btn {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 14px;
    padding: 16px 18px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    color: var(--text);
    cursor: pointer;
    text-align: left;
    transition: all 0.18s;
    display: flex;
    align-items: center;
    gap: 12px;
    position: relative;
    overflow: hidden;
  }
  .option-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--accent);
    opacity: 0;
    transition: opacity 0.18s;
  }
  .option-letter {
    width: 28px;
    height: 28px;
    border-radius: 8px;
    background: var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 700;
    flex-shrink: 0;
    position: relative;
    z-index: 1;
    transition: all 0.18s;
  }
  .option-text { position: relative; z-index: 1; line-height: 1.3; }

  .option-btn:not(.selected):not(.correct):not(.wrong):hover {
    border-color: var(--accent);
    transform: translateY(-2px);
  }
  .option-btn:not(.selected):not(.correct):not(.wrong):hover .option-letter {
    background: var(--accent);
    color: var(--bg);
  }

  .option-btn.selected { border-color: var(--accent); background: rgba(240,192,64,0.08); pointer-events: none; }
  .option-btn.correct { border-color: var(--correct); background: rgba(62,207,142,0.1); pointer-events: none; animation: correctPop 0.4s ease; }
  .option-btn.correct .option-letter { background: var(--correct); color: var(--bg); }
  .option-btn.wrong { border-color: var(--wrong); background: rgba(224,90,48,0.1); pointer-events: none; animation: shake 0.4s ease; }
  .option-btn.wrong .option-letter { background: var(--wrong); color: #fff; }
  .option-btn.disabled { pointer-events: none; opacity: 0.5; }

  @keyframes correctPop {
    0% { transform: scale(1); }
    40% { transform: scale(1.03); }
    100% { transform: scale(1); }
  }
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    25% { transform: translateX(-6px); }
    75% { transform: translateX(6px); }
  }

  .feedback-bar {
    height: 52px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    padding: 0 18px;
    font-size: 15px;
    font-weight: 600;
    margin-bottom: 20px;
    transition: all 0.3s;
    opacity: 0;
  }
  .feedback-bar.show { opacity: 1; }
  .feedback-bar.correct-fb { background: rgba(62,207,142,0.12); border: 1px solid rgba(62,207,142,0.3); color: var(--correct); }
  .feedback-bar.wrong-fb { background: rgba(224,90,48,0.12); border: 1px solid rgba(224,90,48,0.3); color: var(--wrong); }

  .next-btn-wrap { text-align: right; }
  .btn-next {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 14px 28px;
    width: auto;
    background: var(--accent);
    color: var(--bg);
    border-radius: 12px;
    border: none;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    opacity: 0;
    pointer-events: none;
  }
  .btn-next.show { opacity: 1; pointer-events: all; }
  .btn-next:hover { background: #ffd060; transform: translateY(-2px); }

  /* Result screen */
  .result-screen { text-align: center; }

  .score-ring-wrap {
    position: relative;
    width: 180px;
    height: 180px;
    margin: 0 auto 32px;
  }
  .score-ring-wrap svg { transform: rotate(-90deg); }
  .ring-bg { fill: none; stroke: var(--border); stroke-width: 10; }
  .ring-fill {
    fill: none;
    stroke: var(--accent);
    stroke-width: 10;
    stroke-linecap: round;
    stroke-dasharray: 502;
    stroke-dashoffset: 502;
    transition: stroke-dashoffset 1.2s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .ring-fill.excellent { stroke: var(--correct); }
  .ring-fill.good { stroke: var(--accent); }
  .ring-fill.needs { stroke: var(--accent2); }

  .score-center {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  .score-big {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 52px;
    line-height: 1;
  }
  .score-total { font-size: 13px; color: var(--muted); }

  .result-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(36px, 8vw, 56px);
    line-height: 1;
    margin-bottom: 8px;
  }

  .performance-badge {
    display: inline-block;
    padding: 8px 24px;
    border-radius: 30px;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 28px;
  }
  .excellent-badge { background: rgba(62,207,142,0.15); color: var(--correct); border: 1px solid rgba(62,207,142,0.3); }
  .good-badge { background: rgba(240,192,64,0.15); color: var(--accent); border: 1px solid rgba(240,192,64,0.3); }
  .needs-badge { background: rgba(224,90,48,0.15); color: var(--accent2); border: 1px solid rgba(224,90,48,0.3); }

  .result-stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-bottom: 28px;
  }
  .res-stat {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px 12px;
    text-align: center;
  }
  .res-stat-num { font-family: 'Bebas Neue', sans-serif; font-size: 32px; line-height: 1; }
  .res-stat-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; margin-top: 4px; }

  .result-actions { display: flex; flex-direction: column; gap: 10px; }
</style>
</head>
<body>

<div class="blob blob-1"></div>
<div class="blob blob-2"></div>
<div class="blob blob-3"></div>

<div class="container">

  <!-- WELCOME SCREEN -->
  <div class="screen active" id="welcomeScreen">
    <div class="welcome-header">
      <div class="badge">🧠 15 Questions · Mixed Topics</div>
      <div class="title-big">BRAIN<br><span>QUEST</span></div>
      <p class="subtitle">Test your math, logic, and reasoning skills. Answer all 15 questions to get your score.</p>
      <div class="stats-row">
        <div class="stat"><div class="stat-num">15</div><div class="stat-label">Questions</div></div>
        <div class="stat"><div class="stat-num">∞</div><div class="stat-label">Retries</div></div>
        <div class="stat"><div class="stat-num">4</div><div class="stat-label">Choices each</div></div>
      </div>
    </div>
    <div class="card">
      <div class="input-group">
        <label>Your Name</label>
        <input type="text" id="playerName" placeholder="Enter your name to begin..." maxlength="40">
      </div>
      <button class="btn btn-primary" onclick="startQuiz()">Start Quiz →</button>
    </div>
  </div>

  <!-- QUIZ SCREEN -->
  <div class="screen" id="quizScreen">
    <div class="quiz-header">
      <div class="q-label">Question <span id="qNum">1</span> of 15</div>
      <div class="score-pill">Score: <span id="liveScore">0</span></div>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="progressFill" style="width:0%"></div>
    </div>
    <div class="card">
      <div class="question-text" id="questionText"></div>
      <div class="options-grid" id="optionsGrid"></div>
      <div class="feedback-bar" id="feedbackBar"></div>
      <div class="next-btn-wrap">
        <button class="btn-next" id="nextBtn" onclick="nextQuestion()">Next <span>→</span></button>
      </div>
    </div>
  </div>

  <!-- RESULT SCREEN -->
  <div class="screen" id="resultScreen">
    <div class="result-screen">
      <div class="score-ring-wrap">
        <svg width="180" height="180" viewBox="0 0 180 180">
          <circle class="ring-bg" cx="90" cy="90" r="80"/>
          <circle class="ring-fill" id="ringFill" cx="90" cy="90" r="80"/>
        </svg>
        <div class="score-center">
          <div class="score-big" id="finalScoreNum">0</div>
          <div class="score-total">out of 15</div>
        </div>
      </div>
      <div class="result-name" id="resultName"></div>
      <div class="performance-badge" id="perfBadge"></div>
      <div class="result-stats">
        <div class="res-stat">
          <div class="res-stat-num" id="resCorrect" style="color:var(--correct)">0</div>
          <div class="res-stat-label">Correct</div>
        </div>
        <div class="res-stat">
          <div class="res-stat-num" id="resWrong" style="color:var(--wrong)">0</div>
          <div class="res-stat-label">Wrong</div>
        </div>
        <div class="res-stat">
          <div class="res-stat-num" id="resPct" style="color:var(--accent)">0%</div>
          <div class="res-stat-label">Score %</div>
        </div>
      </div>
      <div class="result-actions">
        <button class="btn btn-primary" onclick="restartQuiz()">Play Again →</button>
        <button class="btn btn-secondary" onclick="goHome()">← Change Name</button>
      </div>
    </div>
  </div>

</div>

<script>
const questions = [
  { q: "What is 20 × 12?", options: ["190","160","240","250"], correct: "C" },
  { q: "What is 25% of 200?", options: ["65","50","60","75"], correct: "B" },
  { q: "2, 4, 8, 16, ?", options: ["24","32","36","40"], correct: "B" },
  { q: "What is 15 + 27?", options: ["40","42","45","50"], correct: "B" },
  { q: "What is 30% of 150?", options: ["35","40","45","50"], correct: "C" },
  { q: "Which is the odd one out?", options: ["Apple","Mango","Banana","Car"], correct: "D" },
  { q: "What is the square of 12?", options: ["124","144","154","164"], correct: "B" },
  { q: "If a train travels 60 km in 1 hour, how far does it go in 3 hours?", options: ["120 km","150 km","180 km","200 km"], correct: "C" },
  { q: "A pen costs ₹10. What is the cost of 7 pens?", options: ["₹60","₹65","₹70","₹75"], correct: "C" },
  { q: "Rahul is the brother of Neha. Neha is the daughter of Sunil. How is Sunil related to Rahul?", options: ["Father","Brother","Uncle","Grandfather"], correct: "A" },
  { q: "A boy walks north, then turns right. Which direction is he facing now?", options: ["South","East","West","North"], correct: "B" },
  { q: "If all roses are flowers and some flowers fade quickly, are all roses guaranteed to fade quickly?", options: ["Yes","No","Maybe","Cannot Say"], correct: "B" },
  { q: "Unscramble the word: 'ETARW'", options: ["Water","Earth","Tiger","River"], correct: "A" },
  { q: "Unscramble the word: 'NOHTPY'", options: ["Java","Ruby","Python","Swift"], correct: "C" },
  { q: "Rahul walks 10 m north, turns right, walks 5 m, then turns right and walks 10 m. Which direction is he from his starting point?", options: ["North","South","East","West"], correct: "C" },
];

const letters = ['A','B','C','D'];
let currentQ = 0;
let score = 0;
let playerName = '';
let answered = false;

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  const el = document.getElementById(id);
  el.classList.add('active');
  void el.offsetWidth; // force reflow for animation
}

function startQuiz() {
  const nameInput = document.getElementById('playerName').value.trim();
  if (!nameInput) {
    document.getElementById('playerName').style.borderColor = 'var(--wrong)';
    document.getElementById('playerName').placeholder = 'Please enter your name!';
    return;
  }
  playerName = nameInput;
  currentQ = 0;
  score = 0;
  showScreen('quizScreen');
  renderQuestion();
}

function renderQuestion() {
  answered = false;
  const q = questions[currentQ];
  document.getElementById('qNum').textContent = currentQ + 1;
  document.getElementById('liveScore').textContent = score;
  document.getElementById('progressFill').style.width = ((currentQ / 15) * 100) + '%';
  document.getElementById('questionText').textContent = q.q;

  const grid = document.getElementById('optionsGrid');
  grid.innerHTML = '';
  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.innerHTML = `<span class="option-letter">${letters[i]}</span><span class="option-text">${opt}</span>`;
    btn.onclick = () => selectAnswer(letters[i], btn);
    grid.appendChild(btn);
  });

  const fb = document.getElementById('feedbackBar');
  fb.className = 'feedback-bar';
  fb.textContent = '';

  const nxt = document.getElementById('nextBtn');
  nxt.className = 'btn-next';
  nxt.textContent = currentQ === 14 ? 'See Results ✓' : 'Next →';
}

function selectAnswer(chosen, clickedBtn) {
  if (answered) return;
  answered = true;

  const correct = questions[currentQ].correct;
  const allBtns = document.querySelectorAll('.option-btn');
  const fb = document.getElementById('feedbackBar');

  allBtns.forEach((btn, i) => {
    btn.classList.add('disabled');
    if (letters[i] === correct) btn.classList.add('correct');
    if (btn === clickedBtn && chosen !== correct) btn.classList.add('wrong');
  });

  if (chosen === correct) {
    score++;
    document.getElementById('liveScore').textContent = score;
    fb.className = 'feedback-bar correct-fb show';
    fb.textContent = '✓ Correct!';
  } else {
    fb.className = 'feedback-bar wrong-fb show';
    fb.textContent = `✗ Wrong! Correct answer: ${correct}`;
  }

  document.getElementById('nextBtn').classList.add('show');
}

function nextQuestion() {
  currentQ++;
  if (currentQ >= 15) {
    showResults();
  } else {
    renderQuestion();
  }
}

function showResults() {
  showScreen('resultScreen');
  document.getElementById('progressFill').style.width = '100%';

  const pct = Math.round((score / 15) * 100);
  document.getElementById('finalScoreNum').textContent = score;
  document.getElementById('resultName').textContent = `Nice work, ${playerName.toUpperCase()}!`;
  document.getElementById('resCorrect').textContent = score;
  document.getElementById('resWrong').textContent = 15 - score;
  document.getElementById('resPct').textContent = pct + '%';

  const ring = document.getElementById('ringFill');
  const circumference = 502;
  const offset = circumference - (score / 15) * circumference;

  const badge = document.getElementById('perfBadge');
  if (score >= 12) {
    badge.className = 'performance-badge excellent-badge';
    badge.textContent = '🏆 Excellent';
    ring.className = 'ring-fill excellent';
  } else if (score >= 10) {
    badge.className = 'performance-badge good-badge';
    badge.textContent = '👍 Good';
    ring.className = 'ring-fill good';
  } else {
    badge.className = 'performance-badge needs-badge';
    badge.textContent = '📚 Needs Improvement';
    ring.className = 'ring-fill needs';
  }

  setTimeout(() => { ring.style.strokeDashoffset = offset; }, 100);
}

function restartQuiz() {
  currentQ = 0;
  score = 0;
  showScreen('quizScreen');
  renderQuestion();
}

function goHome() {
  showScreen('welcomeScreen');
  document.getElementById('playerName').value = '';
  document.getElementById('playerName').style.borderColor = '';
}

// Enter key support
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.getElementById('welcomeScreen').classList.contains('active')) {
    startQuiz();
  }
});
</script>
</body>
</html>
